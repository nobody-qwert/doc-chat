services:
  rag-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - embed
      - diagnostics
    # Note: OCR service is started via profile (qwen3 or mineru) and accessed via 'ocr-module' network alias
    stop_grace_period: 1s
    environment:
      APP_DATA_ROOT: ${APP_DATA_ROOT}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_CONTEXT_SIZE: ${LLM_CONTEXT_SIZE}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      DATA_DIR: ${DATA_DIR}
      INDEX_DIR: ${INDEX_DIR}
      DOC_STORE_PATH: ${DOC_STORE_PATH}
      OCR_MODULE_URL: ${OCR_MODULE_URL}
      OCR_MODULE_TIMEOUT: ${OCR_MODULE_TIMEOUT}
      OCR_PARSER_KEY: ${OCR_PARSER_KEY}
      LLM_CONTROL_URL: ${LLM_CONTROL_URL}
      OCR_CONTROL_URL: ${OCR_CONTROL_URL}
      GPU_PHASE_TIMEOUT: ${GPU_PHASE_TIMEOUT}
      DIAGNOSTICS_URL: ${DIAGNOSTICS_URL}
    volumes:
      - ${HOST_APP_DATA}:${APP_DATA_ROOT}
    ports:
      - "${BACKEND_PORT}:8000"

  # OCR with Qwen3-VL (default) - use: docker compose --profile qwen3 up
  ocr-qwen3:
    profiles: [qwen3]
    build:
      context: ./ocr_qwen3vl
      dockerfile: Dockerfile
      args:
        PREFETCH_MODELS: ${PREFETCH_MODELS}
        LLAMA_CPP_PYTHON_REF: ${LLAMA_CPP_PYTHON_REF:-main}
        LLAMA_CPP_PYTHON_CACHE_BUST: ${LLAMA_CPP_PYTHON_CACHE_BUST:-1}
    env_file:
      - .env
      - ./ocr_qwen3vl/qwen3.env
    stop_grace_period: 1s
    environment:
      APP_DATA_ROOT: ${APP_DATA_ROOT}
      DATA_DIR: ${DATA_DIR}
      INDEX_DIR: ${INDEX_DIR}
      OCR_OUTPUT_DIR: ${OCR_OUTPUT_DIR}
      OCR_INCOMING_DIR: ${OCR_INCOMING_DIR}
      OCR_WARMUP_DIR: ${OCR_WARMUP_DIR}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ${HOST_APP_DATA}:${APP_DATA_ROOT}
      - ./models/vl:/models/vl:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - ocr-module

  # OCR with MinerU - use: docker compose --profile mineru up
  ocr-mineru:
    profiles: [mineru]
    build:
      context: ./ocr_mineru
      dockerfile: Dockerfile
    env_file:
      - .env
      - ./ocr_mineru/mineru.env
    stop_grace_period: 1s
    environment:
      APP_DATA_ROOT: ${APP_DATA_ROOT}
      DATA_DIR: ${DATA_DIR}
      INDEX_DIR: ${INDEX_DIR}
      OCR_OUTPUT_DIR: ${OCR_OUTPUT_DIR}
      OCR_INCOMING_DIR: ${OCR_INCOMING_DIR}
      OCR_WARMUP_DIR: ${OCR_WARMUP_DIR}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ${HOST_APP_DATA}:${APP_DATA_ROOT}
    networks:
      default:
        aliases:
          - ocr-module

  llm_big:
    build:
      context: ./llama-cpp
      dockerfile: Dockerfile
      args:
        LLAMA_CPP_PYTHON_REF: ${LLAMA_CPP_PYTHON_REF:-main}
        LLAMA_CPP_PYTHON_CACHE_BUST: ${LLAMA_CPP_PYTHON_CACHE_BUST:-1}
    image: local/llama-cpp:latest

    stop_grace_period: 1s

    environment:
      LLAMA_CUBLAS: "1"
      LLM_CONTROL_PORT: ${LLM_CONTROL_PORT}
      LLM_SERVER_CMD: >-
        python3 -m llama_cpp.server
        --model /models/llm/Qwen3-30B-A3B-Instruct-2507-Q4_K_M.gguf
        --model_alias default
        --host 0.0.0.0
        --port 8000
        --chat_format chatml
        --n_ctx ${LLM_CONTEXT_SIZE}
        --n_batch ${LLM_BATCH_SIZE}
        --n_gpu_layers -1
        --flash_attn true
        --use_mlock true
        --api_key ${LLM_API_KEY}
      LLM_SERVER_SHUTDOWN_TIMEOUT: ${LLM_SERVER_SHUTDOWN_TIMEOUT}
      LOG_LEVEL: ${LOG_LEVEL}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./models/llm:/models/llm:ro
    ports:
      - "${LLM_HOST_PORT}:8000"

  embed:
    image: local/llama-cpp:latest
    stop_grace_period: 1s
    command: >
      python3 -m llama_cpp.server
      --model /models/embed/${EMBED_MODEL_FILE}
      --model_alias default
      --host 0.0.0.0
      --port 8080
      --embedding true
      --n_ctx ${EMBED_CONTEXT_SIZE}
      --n_gpu_layers -1
      --use_mlock true
      --api_key ${EMBEDDING_API_KEY}
    environment:
      LLAMA_CUBLAS: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ${EMBED_MODEL_DIR}:/models/embed:ro
    ports:
      - "${EMBED_HOST_PORT}:8080"

  diagnostics:
    build:
      context: ./diagnostics
      dockerfile: Dockerfile
    env_file: .env
    stop_grace_period: 1s
    environment:
      PORT: ${DIAGNOSTICS_PORT}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "${DIAGNOSTICS_HOST_PORT}:9001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_LLM_CONTEXT_SIZE: ${LLM_CONTEXT_SIZE}
    depends_on:
      - rag-backend
    stop_grace_period: 1s
    ports:
      - "${FRONTEND_PORT}:80"
